allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Security floors for transitive dependencies (Dependabot alerts 2026-07-04).
# undici rides in via payload, dompurify via monaco-editor, postcss 8.4.31 via
# next's own pin. Remove a line once the parent package catches up on its own.
# undici is capped below 8: it's a floor, not a major bump, and jsdom 29 imports
# undici 7.x internals (undici/lib/handler/wrap-handler.js) that undici 8 moved,
# so an open-ended `>=7.28.0` pulled undici 8 into jsdom 29 and broke its tests.
overrides:
  undici: '>=7.28.0 <8'
  dompurify: '>=3.4.11'
  postcss: '>=8.5.10'
