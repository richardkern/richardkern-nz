allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Security floors for transitive dependencies (Dependabot alerts 2026-07-04).
# dompurify rides in via monaco-editor, postcss 8.4.31 via next's own pin.
# Remove a line once the parent package resolves a safe version on its own
# (verified by dropping the line and re-checking the resolved version — both are
# still needed as of 2026-07-19: without them dompurify drops to 3.2.7 and
# postcss 8.4.31 reappears).
# undici's floor was removed 2026-07-19: payload resolves undici >=7.28.0 on its
# own now, and the open-ended override had been pulling undici 8 into jsdom 29
# and breaking its tests (#89/#92).
overrides:
  dompurify: '>=3.4.11'
  postcss: '>=8.5.10'
